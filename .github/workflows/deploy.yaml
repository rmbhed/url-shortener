name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: rmbh-url-shortener
  REGION: us-central1
  REPO_NAME: shortener-app
  SERVICE_NAME: url-shortener

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/906345259012/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-deployer@rmbh-url-shortener.iam.gserviceaccount.co'

    - name: 'Docker Auth'
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: 'Build and Push Container'
      run: |
        # Note the ./app at the end of the build command
        docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/service:${{ github.sha }} ./app
        docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/service:${{ github.sha }}

    - name: 'Deploy to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        image: 'us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/service:${{ github.sha }}'
        region: ${{ env.REGION }}
        # Pass the Project ID to your Go app so Firestore works
        env_vars: |
          PROJECT_ID=${{ env.PROJECT_ID }}